# VULNERABILITY FIXED: #1 - HTTP Request Smuggling (CVE-2019-18277)
# FIX: Removed 'no option http-use-htx' which disabled modern HTTP parsing
# FIX: Using HTX (modern HTTP implementation) prevents CL.TE desync attacks
defaults
	mode http
  	timeout http-keep-alive 10s
	timeout http-request 30s
	timeout connect 5s
	timeout server 60s
	timeout client 30s

    # FIX: Enable HTX (default in HAProxy 2.0+) for proper HTTP parsing
    # This prevents HTTP Request Smuggling attacks
    option http-use-htx


frontend http
	bind *:8001
	monitor-uri /healthcheck

	acl ACL_router_internal hdr(host) -i internal.router
	use_backend router_internal if ACL_router_internal

	default_backend router_external


backend router_external
    # FIX: Changed from 'http-reuse always' to 'http-reuse safe' to prevent connection reuse attacks
    # VULNERABILITY FIXED: #1 - HTTP Request Smuggling (safer connection reuse)
	http-reuse safe
    server external ${SERVER_HOSTNAME}:${SERVER_PORT}


backend router_internal
    # FIX: Changed from 'http-reuse always' to 'http-reuse safe'
	http-reuse safe
	http-response add-header X-Forwarded-Host internal.router
	http-response add-header X-Upstream-Proxy "mitmproxy (6.0.2)"
    http-response add-header Via "haproxy (2.0.5)"
    server internal ${SERVER_HOSTNAME}:${SERVER_PORT}