# =============================================================================
# HAProxy Configuration
# =============================================================================
# 
# SECURITY FIXES APPLIED:
# -----------------------
# 1. HTTP REQUEST SMUGGLING (CVE-2019-18277):
#    - Removed 'no option http-use-htx' which disabled modern HTTP parsing
#    - HTX mode (enabled by default in HAProxy 2.0+) prevents CL.TE desync attacks
#    - Changed 'http-reuse always' to 'http-reuse safe' for safer connection reuse
#
# 2. ADDED GLOBAL SECTION:
#    - HAProxy requires a global section for proper operation
#    - Added logging and connection limits
#
# 3. FIXED INDENTATION:
#    - Standardized to 4-space indentation (was mixing tabs/spaces)
# =============================================================================

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
# FIX: Added missing global section (required by HAProxy)
global
    log stdout format raw local0
    maxconn 4096

# -----------------------------------------------------------------------------
# Default Settings
# -----------------------------------------------------------------------------
defaults
    mode http
    timeout http-keep-alive 10s
    timeout http-request 30s
    timeout connect 5s
    timeout server 60s
    timeout client 30s
    # NOTE: HTX is enabled by default in HAProxy 2.0+ for proper HTTP parsing
    # This prevents HTTP Request Smuggling attacks (CL.TE desync)

# -----------------------------------------------------------------------------
# Frontend Configuration
# -----------------------------------------------------------------------------
# Listens on port 8001 and routes requests based on Host header
frontend http
    bind *:8001
    monitor-uri /healthcheck
    # Route to internal backend if Host header is 'internal.router'
    acl ACL_router_internal hdr(host) -i internal.router
    use_backend router_internal if ACL_router_internal
    # Default to external backend
    default_backend router_external

# -----------------------------------------------------------------------------
# Backend: External Router (Default)
# -----------------------------------------------------------------------------
backend router_external
    # SECURITY FIX: Changed from 'http-reuse always' to 'http-reuse safe'
    # 'always' could allow request smuggling via connection reuse
    # 'safe' only reuses connections when it's safe to do so
    http-reuse safe
    server external ${SERVER_HOSTNAME}:${SERVER_PORT}

# -----------------------------------------------------------------------------
# Backend: Internal Router (for internal.router hostname)
# -----------------------------------------------------------------------------
backend router_internal
    # SECURITY FIX: Changed from 'http-reuse always' to 'http-reuse safe'
    http-reuse safe
    # Add headers to identify the proxy chain
    http-response add-header X-Forwarded-Host internal.router
    http-response add-header X-Upstream-Proxy "mitmproxy (6.0.2)"
    http-response add-header Via "haproxy (2.0.5)"
    server internal ${SERVER_HOSTNAME}:${SERVER_PORT}