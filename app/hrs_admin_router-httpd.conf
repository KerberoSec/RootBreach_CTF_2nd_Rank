<VirtualHost *:80>
    DocumentRoot /var/www/hrs_admin_router/
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    WSGIDaemonProcess /hrs_admin_router python-path=/var/www/hrs_admin_router/
    WSGIProcessGroup /hrs_admin_router
    WSGIScriptAlias / /var/www/hrs_admin_router/hrs_admin_router.wsgi

    WSGIChunkedRequest On
    KeepAliveTimeout 20

    <Directory "/var/www/hrs_admin_router/app/">
        # FIX: Restrict CORS to specific trusted origins instead of wildcard
        # VULNERABILITY FIXED: #6 - CORS Misconfiguration (was "*")
        # In production, replace with actual trusted domain
        Header set Access-Control-Allow-Origin "https://trusted-domain.example.com"
        Header set Access-Control-Allow-Methods "GET, POST"
        Header set Access-Control-Allow-Headers "Content-Type"
        WSGIProcessGroup /hrs_admin_router
        WSGIApplicationGroup %{GLOBAL}
        Options +ExecCGI
        # FIX: Removed "Indexes" to disable directory listing
        # VULNERABILITY FIXED: #16 - Directory Listing Enabled (removed Indexes)
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    Servername internal.router
    DocumentRoot /var/www/internal_router
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    WSGIDaemonProcess /internal_router python-path=/var/www/internal_router/
    WSGIProcessGroup /internal_router
    WSGIScriptAlias / /var/www/internal_router/internal_router.wsgi

    WSGIChunkedRequest On
    KeepAliveTimeout 20

    <Directory "/var/www/internal_router/app/">
        # FIX: Restrict CORS - internal service should not allow external origins
        # VULNERABILITY FIXED: #6 - CORS Misconfiguration (was "*")
        # Internal service should deny all external CORS requests
        Header set Access-Control-Allow-Origin "null"
        WSGIProcessGroup /internal_router
        WSGIApplicationGroup %{GLOBAL}
        Options +ExecCGI
        # FIX: Removed "Indexes" to disable directory listing
        # VULNERABILITY FIXED: #16 - Directory Listing Enabled (removed Indexes)
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>