# =============================================================================
# Apache VirtualHost Configuration
# =============================================================================
#
# SECURITY FIXES APPLIED:
# -----------------------
# 1. SERVERNAME DIRECTIVE:
#    - Fixed typo: 'Servername' -> 'ServerName' (case-sensitive)
#    - Added ServerName to first VirtualHost (was missing)
#
# 2. WSGI PROCESS NAMING:
#    - Fixed invalid process names: '/hrs_admin_router' -> 'hrs_admin_router'
#    - Process names should not start with '/'
#
# 3. CORS CONFIGURATION:
#    - Changed from wildcard '*' to specific trusted origin
#    - Internal service uses 'null' to deny all CORS requests
#
# 4. DIRECTORY LISTING:
#    - Removed 'Indexes' option to disable directory listing
#    - Prevents information disclosure of directory contents
#
# =============================================================================

# -----------------------------------------------------------------------------
# Main Website VirtualHost (External)
# -----------------------------------------------------------------------------
# Serves the main Flask application on port 80
<VirtualHost *:80>
    # FIX: Added ServerName directive (was missing)
    ServerName localhost
    DocumentRoot /var/www/hrs_admin_router/
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    # FIX: Removed leading '/' from process name (was '/hrs_admin_router')
    WSGIDaemonProcess hrs_admin_router python-path=/var/www/hrs_admin_router/
    WSGIProcessGroup hrs_admin_router
    WSGIScriptAlias / /var/www/hrs_admin_router/hrs_admin_router.wsgi

    # Enable chunked request handling for large uploads
    WSGIChunkedRequest On
    KeepAliveTimeout 20

    <Directory "/var/www/hrs_admin_router/app/">
        # -----------------------------------------------------------------
        # SECURITY FIX: CORS Configuration
        # -----------------------------------------------------------------
        # VULNERABILITY: Was using wildcard '*' allowing any origin
        # RISK: Cross-origin attacks, data theft
        # FIX: Restrict to specific trusted domain
        # NOTE: Replace with actual domain in production
        Header set Access-Control-Allow-Origin "https://trusted-domain.example.com"
        Header set Access-Control-Allow-Methods "GET, POST"
        Header set Access-Control-Allow-Headers "Content-Type"
        
        WSGIProcessGroup hrs_admin_router
        WSGIApplicationGroup %{GLOBAL}
        Options +ExecCGI
        
        # -----------------------------------------------------------------
        # SECURITY FIX: Disabled Directory Listing
        # -----------------------------------------------------------------
        # VULNERABILITY: 'Indexes' option was enabled
        # RISK: Information disclosure - attackers can see all files
        # FIX: Removed 'Indexes', only 'FollowSymLinks' remains
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>

# -----------------------------------------------------------------------------
# Internal Router VirtualHost
# -----------------------------------------------------------------------------
# Serves internal API endpoints, accessed via Host: internal.router
# This should only be accessible through the proxy chain (HAProxy -> mitmproxy)
<VirtualHost *:80>
    # FIX: Changed 'Servername' to 'ServerName' (case-sensitive directive)
    ServerName internal.router
    DocumentRoot /var/www/internal_router
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    # FIX: Removed leading '/' from process name (was '/internal_router')
    WSGIDaemonProcess internal_router python-path=/var/www/internal_router/
    WSGIProcessGroup internal_router
    WSGIScriptAlias / /var/www/internal_router/internal_router.wsgi

    WSGIChunkedRequest On
    KeepAliveTimeout 20

    <Directory "/var/www/internal_router/app/">
        # -----------------------------------------------------------------
        # SECURITY FIX: CORS - Internal Service
        # -----------------------------------------------------------------
        # VULNERABILITY: Was using wildcard '*' 
        # RISK: External sites could make requests to internal service
        # FIX: Set to 'null' to deny all CORS requests
        # Internal services should not accept cross-origin requests
        Header set Access-Control-Allow-Origin "null"
        
        WSGIProcessGroup internal_router
        WSGIApplicationGroup %{GLOBAL}
        Options +ExecCGI
        
        # SECURITY FIX: Disabled Directory Listing
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>